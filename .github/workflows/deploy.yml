name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        # TODO: Replace this step with your actual deployment command.
        # Examples:
        #   Vercel:  npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
        #   Netlify: npx netlify-cli deploy --prod --auth ${{ secrets.NETLIFY_TOKEN }}
        #   Custom:  ./scripts/deploy.sh
        run: echo "Add your deployment command here"
        env:
          NODE_ENV: production
